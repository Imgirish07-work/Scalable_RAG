[alembic]
# Path to migration scripts. Relative to where you run `alembic` from.
script_location = backend/migrations

# Prepend project root to sys.path so `import backend...` works inside env.py.
prepend_sys_path = .

# Cross-platform path separator.
version_path_separator = os

# Connection URL is injected at runtime by env.py from BackendSettings.
# Leaving this blank keeps the repo free of any credential-shaped strings.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
