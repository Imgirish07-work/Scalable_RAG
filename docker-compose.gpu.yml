# GPU overlay for docker-compose.
#
# Grants the backend container access to all NVIDIA GPUs on the host.
# Requires NVIDIA Container Toolkit installed inside WSL2 (Windows) or
# the host (Linux). Use only on machines with a CUDA-capable GPU.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile dev up --build
#
# On CPU-only machines, just run the base file:
#   docker compose --profile dev up --build

services:
  backend:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
