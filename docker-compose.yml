# Scalable RAG — local dev stack (Phase 1).
#
# Services:
#   qdrant    — Vector DB
#   postgres  — Users + API keys (also visible in pgAdmin on localhost:5432)
#   redis     — Cache
#   backend   — FastAPI app
#
# Both docker and bare-metal modes use the same Postgres container.
#   docker mode  → backend container talks to compose service `postgres:5432`
#   native mode  → uvicorn on host talks to `localhost:5432` (compose exposes it)
#   pgAdmin      → connect to localhost:5432 to inspect data
#
# Usage:
#   1. Copy .env.example to .env and set POSTGRES_* + LLM keys + bootstrap token.
#   2. docker compose --profile dev up --build
#   3. docker compose exec backend alembic -c backend/migrations/alembic.ini upgrade head

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    profiles: ["dev", "full"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 5s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["dev", "full"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["dev", "full"]
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    profiles: ["dev", "full"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_PREFER_GRPC: "false"
      REDIS_URL: "redis://redis:6379/0"
      # In container, backend uses the compose service hostname.
      BACKEND_DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}"
      DEBUG: "false"
    volumes:
      - ./backend:/app/backend:ro
      - ./pipeline:/app/pipeline:ro
      - ./rag:/app/rag:ro
      - ./agents:/app/agents:ro
      - ./cache:/app/cache:ro
      - ./chunking:/app/chunking:ro
      - ./config:/app/config:ro
      - ./llm:/app/llm:ro
      - ./utils:/app/utils:ro
      - ./vectorstore:/app/vectorstore:ro
      - ./optimizer:/app/optimizer:ro
      - ./models:/app/models:ro
      - backend_data:/app/data
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  backend_data:
